{% extends 'core/base.html' %}
{% block content %}
<h2>Користувачі</h2>
<ul>
    {% for user in users %}
    <li>
        <a href="{% url 'chat' user.id %}">{{ user.username }}</a>
    </li>
    {% empty %}
    <li>Немає інших користувачів.</li>
    {% endfor %}
</ul>
<a href="{% url 'inbox' %}">Назад до повідомлень</a>
{% endblock %}
